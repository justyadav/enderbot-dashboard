<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>EnderBot - Logging in...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050508;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            padding: 40px;
            background: #12121A;
            border-radius: 16px;
            border: 1px solid #2A2A4A;
            max-width: 500px;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #2A2A4A;
            border-top-color: #6C3CE1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h2 { font-family: 'Orbitron', sans-serif; margin-bottom: 8px; }
        p { color: #A8A8C8; font-size: 14px; }
        .error { color: #ED4245; display: none; margin-top: 16px; }
        .success { color: #57F287; display: none; margin-top: 16px; }
        .status-text { font-size: 13px; margin-top: 8px; }
        .debug-info {
            background: #0A0A0F;
            padding: 12px;
            border-radius: 4px;
            margin-top: 16px;
            text-align: left;
            font-size: 12px;
            color: #6A6A8A;
            word-break: break-all;
            display: none;
            border: 1px solid #2A2A4A;
        }
        .debug-info.show { display: block; }
        .debug-info strong { color: #A8A8C8; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 EnderBot</h2>
        <p id="statusText">Logging you in...</p>
        <div class="spinner" id="spinner"></div>
        <p class="status-text" id="statusSubtext">Please wait while we authenticate you</p>
        <div class="error" id="errorMessage">⚠️ Authentication failed</div>
        <div class="success" id="successMessage">✅ Login successful! Redirecting...</div>
        <div class="debug-info" id="debugInfo"></div>
    </div>

    <script>
        (function() {
            // ─── Get URL Parameters ───
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            const error = urlParams.get('error');
            const errorDescription = urlParams.get('error_description');

            // ─── DOM Elements ───
            const statusText = document.getElementById('statusText');
            const statusSubtext = document.getElementById('statusSubtext');
            const spinner = document.getElementById('spinner');
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const debugInfo = document.getElementById('debugInfo');

            // ─── Show Debug Info ───
            debugInfo.classList.add('show');
            debugInfo.innerHTML = `
                <strong>🔍 Debug Information:</strong><br>
                <strong>Full URL:</strong> ${window.location.href}<br>
                <strong>Pathname:</strong> ${window.location.pathname}<br>
                <strong>Search:</strong> ${window.location.search || '(empty)'}<br>
                <strong>Code:</strong> ${code || '❌ Not found'}<br>
                <strong>State:</strong> ${state || '❌ Not found'}<br>
                <strong>Error:</strong> ${error || 'None'}<br>
                <strong>Error Description:</strong> ${errorDescription || 'None'}<br>
                <strong>All Params:</strong> ${window.location.search || '(empty)'}
            `;

            // ─── Handle Error ───
            if (error) {
                statusText.textContent = 'Authentication Failed';
                statusSubtext.textContent = errorDescription || 'An error occurred during authentication.';
                spinner.style.display = 'none';
                errorDiv.style.display = 'block';
                return;
            }

            // ─── Handle Success ───
            if (code && state) {
                statusText.textContent = 'Login Successful!';
                statusSubtext.textContent = 'Redirecting to dashboard...';
                spinner.style.display = 'none';
                successDiv.style.display = 'block';

                // ─── Redirect to dashboard with the code ───
                setTimeout(function() {
                    window.location.href = '/dashboard.html?code=' + code + '&state=' + state;
                }, 1500);
            } else {
                statusText.textContent = 'No Authorization Code';
                statusSubtext.textContent = 'No authorization code was received from Discord.';
                spinner.style.display = 'none';
                errorDiv.style.display = 'block';
                
                // ─── If no code, redirect to home after 3 seconds ───
                setTimeout(function() {
                    window.location.href = '/index.html?error=no_code';
                }, 3000);
            }
        })();
    </script>

</body>
</html>
