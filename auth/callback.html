<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>EnderBot - Logging in...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050508;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            padding: 40px;
            background: #12121A;
            border-radius: 16px;
            border: 1px solid #2A2A4A;
            max-width: 400px;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #2A2A4A;
            border-top-color: #6C3CE1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h2 { font-family: 'Orbitron', sans-serif; margin-bottom: 8px; }
        p { color: #A8A8C8; font-size: 14px; }
        .error { color: #ED4245; display: none; margin-top: 16px; }
        .success { color: #57F287; display: none; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 EnderBot</h2>
        <p id="statusText">Logging you in...</p>
        <div class="spinner" id="spinner"></div>
        <p style="font-size: 12px; color: #6A6A8A;">Please wait while we authenticate you</p>
        <div class="error" id="errorMessage">
            <p style="color: #ED4245;">⚠️ Authentication failed. Please try again.</p>
        </div>
        <div class="success" id="successMessage">
            <p style="color: #57F287;">✅ Login successful! Closing this window...</p>
        </div>
    </div>

    <script>
        // ─── Handle OAuth Callback ───
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');
        const error = urlParams.get('error');

        // Get elements
        const statusText = document.getElementById('statusText');
        const spinner = document.getElementById('spinner');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');

        if (error) {
            statusText.textContent = 'Authentication failed';
            spinner.style.display = 'none';
            errorDiv.style.display = 'block';
            return;
        }

        if (code && state) {
            // Send code to parent window and close
            if (window.opener) {
                statusText.textContent = 'Login successful!';
                spinner.style.display = 'none';
                successDiv.style.display = 'block';
                
                window.opener.postMessage({
                    type: 'discord_oauth',
                    success: true,
                    code: code,
                    state: state
                }, window.opener.location.origin);
                
                // Close popup after delay
                setTimeout(() => window.close(), 2000);
            } else {
                // If opened directly, redirect to home with code
                window.location.href = `/?code=${code}&state=${state}`;
            }
        } else {
            statusText.textContent = 'No authorization code found';
            spinner.style.display = 'none';
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
