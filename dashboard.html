<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>EnderBot - Logging in...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050508;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            padding: 40px;
            background: #12121A;
            border-radius: 16px;
            border: 1px solid #2A2A4A;
            max-width: 400px;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #2A2A4A;
            border-top-color: #6C3CE1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h2 { font-family: 'Orbitron', sans-serif; margin-bottom: 8px; }
        p { color: #A8A8C8; font-size: 14px; }
        .error { color: #ED4245; display: none; margin-top: 16px; }
        .success { color: #57F287; display: none; margin-top: 16px; }
        .status-text { font-size: 13px; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 EnderBot</h2>
        <p id="statusText">Logging you in...</p>
        <div class="spinner" id="spinner"></div>
        <p class="status-text" id="statusSubtext">Please wait while we authenticate you</p>
        <div class="error" id="errorMessage">⚠️ Authentication failed</div>
        <div class="success" id="successMessage">✅ Login successful! Redirecting...</div>
    </div>

    <script>
        (function() {
            // ─── Get URL Parameters ───
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            const error = urlParams.get('error');

            // ─── DOM Elements ───
            const statusText = document.getElementById('statusText');
            const statusSubtext = document.getElementById('statusSubtext');
            const spinner = document.getElementById('spinner');
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');

            // ─── Handle Error ───
            if (error) {
                statusText.textContent = 'Authentication Failed';
                statusSubtext.textContent = 'An error occurred during authentication.';
                spinner.style.display = 'none';
                errorDiv.style.display = 'block';
                return;
            }

            // ─── Handle Success ───
            if (code && state) {
                statusText.textContent = 'Login Successful!';
                statusSubtext.textContent = 'Redirecting to dashboard...';
                spinner.style.display = 'none';
                successDiv.style.display = 'block';

                // ─── REDIRECT TO DASHBOARD (NOT INDEX) ───
                setTimeout(function() {
                    window.location.href = '/dashboard.html?code=' + code + '&state=' + state;
                }, 1500);
            } else {
                statusText.textContent = 'No Authorization Code';
                statusSubtext.textContent = 'No authorization code was received.';
                spinner.style.display = 'none';
                errorDiv.style.display = 'block';
                
                // ─── If no code, redirect to home ───
                setTimeout(function() {
                    window.location.href = '/index.html';
                }, 3000);
            }
        })();
    </script>

</body>
</html>
