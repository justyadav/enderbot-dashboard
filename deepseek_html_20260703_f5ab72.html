<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnderBot - Loading</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050508;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
        }

        .loading-container {
            text-align: center;
            position: relative;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #6C3CE1, #FF2D95);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        .subtitle {
            color: #6A6A8A;
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .loader {
            width: 200px;
            height: 4px;
            background: #1A1A2E;
            border-radius: 2px;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
        }

        .loader-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6C3CE1, #FF2D95, #00F5FF);
            border-radius: 2px;
            animation: loading 2s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(108, 60, 225, 0.3);
        }

        @keyframes loading {
            0% { width: 0%; transform: translateX(-100%); }
            50% { width: 100%; transform: translateX(0%); }
            100% { width: 0%; transform: translateX(100%); }
        }

        .status-text {
            color: #6A6A8A;
            font-size: 0.9rem;
            margin-top: 20px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .status-text .highlight {
            color: #6C3CE1;
            font-weight: 600;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #6C3CE1;
            border-radius: 50%;
            opacity: 0.3;
            animation: float-particle 10s infinite;
        }

        @keyframes float-particle {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            50% { transform: translateY(-100px) translateX(50px); opacity: 0.8; }
        }

        .dots {
            display: inline-block;
            width: 20px;
            text-align: left;
        }

        .dots span {
            animation: dot 1.4s infinite;
            opacity: 0;
        }

        .dots span:nth-child(1) { animation-delay: 0s; }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dot {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle" style="top: 10%; left: 20%; animation-delay: 0s;"></div>
        <div class="particle" style="top: 30%; left: 80%; animation-delay: 2s;"></div>
        <div class="particle" style="top: 60%; left: 10%; animation-delay: 4s;"></div>
        <div class="particle" style="top: 80%; left: 70%; animation-delay: 1s;"></div>
        <div class="particle" style="top: 20%; left: 50%; animation-delay: 3s;"></div>
        <div class="particle" style="top: 70%; left: 40%; animation-delay: 5s;"></div>
        <div class="particle" style="top: 50%; left: 90%; animation-delay: 2.5s;"></div>
        <div class="particle" style="top: 90%; left: 30%; animation-delay: 4.5s;"></div>
    </div>

    <div class="loading-container">
        <div class="logo">EnderBot</div>
        <div class="subtitle">INITIALIZING SYSTEM<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
        
        <div class="loader">
            <div class="loader-bar"></div>
        </div>
        
        <div class="status-text">
            <span class="highlight">▸</span> Connecting to <span class="highlight">{{ message }}</span>
        </div>
    </div>

    <script>
        // Simulate loading progress with message updates
        const messages = [
            'Discord Gateway',
            'Database Cluster',
            'Command Registry',
            'Module Cache',
            'Event Handlers'
        ];

        let index = 0;
        const statusEl = document.querySelector('.status-text .highlight:last-child');

        setInterval(() => {
            index = (index + 1) % messages.length;
            statusEl.textContent = messages[index];
        }, 1500);
    </script>
</body>
</html>
