<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ender Bot Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#2f3136] text-gray-200 font-sans">

    <nav class="bg-[#202225] p-4 flex justify-between items-center shadow-md">
        <div class="flex items-center space-x-3">
            <div id="bot-avatar-container" class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center font-bold text-white overflow-hidden">
                <span>E</span>
            </div>
            <span class="text-xl font-bold tracking-wide text-white" id="nav-bot-name">Ender Bot</span>
        </div>
        <button id="login-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-md font-medium transition flex items-center space-x-2 cursor-pointer">
            <i class="fab fa-discord"></i>
            <span id="login-text">Login with Discord</span>
        </button>
    </nav>

    <main class="max-w-6xl mx-auto p-6 mt-8">
        
        <div id="status-state" class="flex flex-col items-center justify-center py-20">
            <div id="spinner" class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-500 mb-4"></div>
            <p id="status-msg" class="text-gray-400">Connecting to Ender Bot systems...</p>
        </div>

        <section id="server-selector" class="hidden">
            <h2 class="text-2xl font-bold mb-6 text-white">Select a Server to Manage</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <section id="settings-panel" class="hidden">
            <div class="flex items-center space-x-4 mb-6">
                <button onclick="goBackToSelector()" class="text-gray-400 hover:text-white transition cursor-pointer">
                    <i class="fas fa-arrow-left text-xl"></i>
                </button>
                <h2 class="text-2xl font-bold text-white">Settings: <span id="current-guild-name" class="text-indigo-400">Loading...</span></h2>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="bg-[#202225] p-4 rounded-lg h-fit space-y-2">
                    <a href="#" class="block bg-[#36393f] text-white p-3 rounded font-medium transition"><i class="fas fa-cog mr-3 text-indigo-400"></i>General Options</a>
                </div>

                <div class="lg:col-span-2 bg-[#36393f] p-6 rounded-lg shadow-lg border border-gray-700">
                    <form id="settings-form" class="space-y-6">
                        <div>
                            <label class="block text-sm font-semibold uppercase tracking-wider text-gray-400 mb-2">Bot Prefix</label>
                            <input type="text" id="prefix-input" class="w-full bg-[#202225] border border-gray-600 rounded p-3 text-white focus:outline-none focus:border-indigo-500 transition" maxlength="5">
                        </div>

                        <div class="flex justify-between items-center py-3 border-t border-gray-700">
                            <div>
                                <h4 class="text-white font-medium">Enable Economy Module</h4>
                                <p class="text-xs text-gray-400">Allows game commands and custom coin transactions.</p>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="economy-toggle" class="sr-only peer">
                                <div class="w-11 h-6 bg-gray-600 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                            </label>
                        </div>

                        <div class="pt-4 border-t border-gray-700 flex justify-end">
                            <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-md font-semibold transition cursor-pointer">Save Configurations</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script>
        // 🚨 CONFIGURATION 🚨
        const BACKEND_URL = "https://enderbot-dashboard-1xtu.onrender.com"; 
        let selectedGuildId = null;

        function checkAuthToken() {
            const hash = window.location.hash;
            if (hash && hash.startsWith("#token=")) {
                const token = hash.split("=")[1];
                localStorage.setItem("discord_token", token);
                window.location.hash = ""; 
            }
            return localStorage.getItem("discord_token");
        }

        async function initializeDashboard() {
            // Setup Login trigger redirect
            document.getElementById('login-btn').onclick = () => {
                window.location.href = `${BACKEND_URL}/api/auth/login`;
            };

            try {
                const statusRes = await fetch(`${BACKEND_URL}/api/status`);
                const statusData = await statusRes.json();
                if (statusData.status === "online") {
                    document.getElementById('nav-bot-name').innerText = statusData.bot.name;
                    document.getElementById('bot-avatar-container').innerHTML = `<img src="${statusData.bot.avatar}" class="w-full h-full object-cover">`;
                }

                const token = checkAuthToken();
                if (!token) {
                    document.getElementById('spinner').classList.add('hidden');
                    document.getElementById('status-msg').innerText = "Please log in using your Discord account credentials.";
                    return;
                }

                document.getElementById('login-text').innerText = "Logged In";

                const guildsRes = await fetch(`${BACKEND_URL}/api/guilds`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                if (guildsRes.status === 401) {
                    localStorage.removeItem("discord_token");
                    window.location.reload();
                    return;
                }
                
                const guilds = await guildsRes.json();
                document.getElementById('status-state').classList.add('hidden');
                renderServerSelector(guilds);

            } catch (err) {
                document.getElementById('spinner').classList.add('hidden');
                document.getElementById('status-msg').innerHTML = `<span class="text-red-400">Failed to sync with API. Check CORS limits or active Render deployment status.</span>`;
            }
        }

        function renderServerSelector(guilds) {
            const container = document.getElementById('server-selector');
            const grid = container.querySelector('.grid');
            grid.innerHTML = "";
            container.classList.remove('hidden');

            guilds.forEach(g => {
                const icon = g.icon || "https://cdn.discordapp.com/embed/avatars/0.png";
                const card = document.createElement('div');
                card.className = "bg-[#36393f] p-5 rounded-lg shadow-lg flex flex-col items-center border border-gray-700";
                
                let actionBtn = g.bot_in_guild 
                    ? `<button onclick="openSettings(${g.id})" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded font-medium cursor-pointer">Manage</button>`
                    : `<a href="https://discord.com/oauth2/authorize?client_id=${g.id}&permissions=8&scope=bot" target="_blank" class="w-full text-center bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded font-medium">Invite Bot</a>`;

                card.innerHTML = `
                    <img src="${icon}" class="w-16 h-16 rounded-full mb-3 object-cover">
                    <h3 class="text-lg font-semibold text-white text-center truncate w-full mb-4">${g.name}</h3>
                    ${actionBtn}
                `;
                grid.appendChild(card);
            });
        }

        async function openSettings(guildId) {
            selectedGuildId = guildId;
            document.getElementById('server-selector').classList.add('hidden');
            document.getElementById('settings-panel').classList.remove('hidden');
            
            const res = await fetch(`${BACKEND_URL}/api/guilds/${guildId}`);
            const data = await res.json();
            
            document.getElementById('current-guild-name').innerText = data.name;
            document.getElementById('prefix-input').value = data.config.prefix || "/";
            document.getElementById('economy-toggle').checked = data.config.economy_enabled ?? false;
        }

        function goBackToSelector() {
            document.getElementById('settings-panel').classList.add('hidden');
            document.getElementById('server-selector').classList.remove('hidden');
        }

        document.getElementById('settings-form').onsubmit = async (e) => {
            e.preventDefault();
            const prefix = document.getElementById('prefix-input').value;
            const economy = document.getElementById('economy-toggle').checked;

            const res = await fetch(`${BACKEND_URL}/api/guilds/${selectedGuildId}/settings`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prefix, economy_enabled: economy })
            });

            if (res.ok) alert("Settings successfully pushed to Ender Bot!");
            else alert("Error pushing settings values.");
        };

        window.onload = initializeDashboard;
    </script>
</body>
</html>
