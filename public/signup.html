<body>
    <div class="login-card">
        <h2>Create Account</h2>
        <form id="signupForm">
            <div class="input-group"><label>Username</label><input type="text" id="username" required></div>
            <div class="input-group"><label>Password</label><input type="password" id="password" required></div>
            <button type="submit">Register</button>
            <p style="text-align:center; font-size:0.9rem; margin-top:1rem;">
                Already registered? <a href="index.html" style="color:#38bdf8;">Sign In</a>
            </p>
        </form>
    </div>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const response = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await response.json();
            alert(data.message);
            if (response.ok) window.location.href = 'index.html';
        });
    </script>
</body>
